name: Deploy Astro static site

on:
  push:
    branches:
      - main
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Resolve latest OwnerLens release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(gh api repos/kodevza/OwnerLens/releases/latest --jq '.tag_name')"
          echo "PUBLIC_OWNERLENS_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build site
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          include-hidden-files: false

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
